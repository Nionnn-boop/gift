<!DOCTYPE html>
<html>
<head>
<title>Locked 💜</title>

<style>
body {
    margin: 0;
    background: #0b001a;
    font-family: Arial;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: #1a0b2e;
    padding: 25px;
    border-radius: 15px;
    text-align: center;
    width: 300px;
}

input {
    padding: 10px;
    width: 90%;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
}

button {
    margin-top: 10px;
    padding: 10px;
    background: #7b2cbf;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

.error {
    color: #ff6b6b;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="box">
    <h2>🔐 Enter Password</h2>

    <form method="POST">
        <input type="password" name="password" placeholder="Enter password">
        <br>
        <button type="submit">Unlock 💜</button>
    </form>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
</div>

</body>
</html>
